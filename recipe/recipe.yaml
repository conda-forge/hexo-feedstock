context:
  version: "8.1.0"

package:
  name: hexo
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/hexo/-/hexo-${{ version }}.tgz
  sha256: 8fd9d55c2c06ef85516608256d17b4deedb23ab1bb8cd2d7ffd22f1af1d22185

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - hexo --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: A fast, simple & powerful blog framework, powered by Node.js.
  homepage: https://github.com/hexojs/hexo
  repository: https://github.com/hexojs/hexo

extra:
  recipe-maintainers:
    - danielnachun
